  async function fetchGitHubActivity() {
    const repoOwner = 'quiet-digital-essentials';
    const repoName = 'quiet-digital-essentials';
    const container = document.getElementById('qde-github-activity');

    try {
      const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/commits?per_page=5`);
      if (!response.ok) throw new Error('Network issue');
      
      const commits = await response.json();
      container.innerHTML = ''; 

      commits.forEach(item => {
        const activityItem = document.createElement('div');
        activityItem.className = 'activity-item';
        activityItem.innerHTML = `
          <p>
            <strong>${item.commit.author.name}</strong> 
            shipped optimization: 
            <a href="${item.html_url}" target="_blank">${item.commit.message}</a>
          </p>
          <small>${new Date(item.commit.author.date).toLocaleDateString()}</small>
        `;
        container.appendChild(activityItem);
      });
    } catch (error) {
      container.innerHTML = '<p>View live metrics on our <a href="https://quiet-digital-essentials.github.io/quiet-digital-essentials/" target="_blank">GitHub Workspace</a>.</p>';
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', fetchGitHubActivity);
  } else {
    fetchGitHubActivity();
  }
</script> </body></html>
